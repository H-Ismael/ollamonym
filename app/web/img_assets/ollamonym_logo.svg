<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="380" viewBox="0 0 1600 380" role="img" aria-labelledby="title desc">
  <title id="title">Ollamonym wordmark</title>
  <desc id="desc">Stylized ØllamØnym logo with red slashed O characters.</desc>
  <defs>
    <linearGradient id="inkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#2a2a2a" />
    </linearGradient>
    <linearGradient id="bloodGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e1061b" />
      <stop offset="100%" stop-color="#b80014" />
    </linearGradient>
    <filter id="bloodGlow" x="-40%" y="-50%" width="180%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="380" fill="none" />
  <text
    x="50%"
    y="57%"
    text-anchor="middle"
    font-family="'Space Grotesk', 'IBM Plex Mono', sans-serif"
    font-size="204"
    font-weight="700"
    letter-spacing="3"
    fill="url(#inkGrad)">
    <tspan fill="url(#bloodGrad)" filter="url(#bloodGlow)">Ø</tspan>llam<tspan fill="url(#bloodGrad)" filter="url(#bloodGlow)">Ø</tspan>nym
  </text>
</svg>
